services:
  panono-webapp:
    build:
      context: .
      dockerfile: Dockerfile
      # Host networking during build avoids Synology DNS/proxy issues during npm ci.
      network: host
      args:
        # Override at build time: docker compose build --build-arg NPM_CI_LOGLEVEL=verbose
        NPM_CI_LOGLEVEL: ${NPM_CI_LOGLEVEL:-warn}
    image: panono-webapp:latest
    container_name: panono-webapp
    restart: unless-stopped
    network_mode: host
    # Root simplifies permissions on Synology (same as reference/removedoubles).
    user: "${CONTAINER_UID:-0}:${CONTAINER_GID:-0}"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      # Dev only — hostname(s) from your Cloudflare tunnel config (see docs/CLOUDFLARED.md)
      # NEXT_DEV_TUNNEL_HOST: dev.example.com
